name: My App CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Step 1: Checkout code
        uses: actions/checkout@v3

      - name: Step 2: Show files
        run: ls -l

      - name: Step 3: Build Docker Image
        run: docker build -t my-app .

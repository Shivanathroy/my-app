name: My App CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Show files
        run: ls -l

      - name: Build Docker image
        run: docker build -t my-app .

      - name: Run Docker container
        run: docker run --rm my-app

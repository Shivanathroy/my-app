<!DOCTYPE html>
<html>
  <head>
    <title>CI/CD Demo</title>
    <style>
      body {
        font-family: Arial;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background: #1a1a2e;
        color: white;
      }
      .card {
        text-align: center;
        padding: 50px;
        background: #16213e;
        border-radius: 15px;
        border: 2px solid #00ff88;
        min-width: 400px;
      }
      .version {
        font-size: 80px;
        color: #00ff88;
        font-weight: bold;
      }
      .badge {
        background: #0f3460;
        padding: 8px 20px;
        border-radius: 20px;
        margin: 5px;
        display: inline-block;
        font-size: 14px;
      }
      .info {
        color: #888;
        margin-top: 10px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🐳 CI/CD Pipeline</h1>
      <div class="version">v1.0.0</div>
      <p>Change this and push to GitHub!</p>
      <div>
        <span class="badge">✅ Nginx</span>
        <span class="badge">✅ Docker</span>
        <span class="badge">✅ GitHub Actions</span>
      </div>
      <p class="info">Author: Shiva Nath Roy</p>
      <p class="info">Server: oracle-host</p>
    </div>
  </body>
</html>

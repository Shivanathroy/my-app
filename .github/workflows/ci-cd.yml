name: My App CI/CD

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t my-app:${{ github.sha }} .

  deploy-dev:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Deploy to Dev on Oracle Host
        run: |
          ssh deploy@oracle-host "
          docker pull my-app:${{ github.sha }} || true
          docker stop my-app-dev || true
          docker rm my-app-dev || true
          docker run -d -p 8080:80 --name my-app-dev my-app:${{ github.sha }}
          "
          
  deploy-qa:
    runs-on: self-hosted
    needs: deploy-dev
    steps:
      - name: Deploy to QA on Oracle Host
        run: |
          ssh deploy@oracle-host "
          docker stop my-app-qa || true
          docker rm my-app-qa || true
          docker run -d -p 8081:80 --name my-app-qa my-app:${{ github.sha }}
          "

  deploy-staging:
    runs-on: self-hosted
    needs: deploy-qa
    steps:
      - name: Deploy to Staging on Oracle Host
        run: |
          ssh deploy@oracle-host "
          docker stop my-app-staging || true
          docker rm my-app-staging || true
          docker run -d -p 8082:80 --name my-app-staging my-app:${{ github.sha }}
          "

  deploy-prod:
    runs-on: self-hosted
    needs: deploy-staging
    steps:
      - name: Deploy to Production on Oracle Host
        run: |
          ssh deploy@oracle-host "
          docker stop my-app-prod || true
          docker rm my-app-prod || true
          docker run -d -p 80:80 --name my-app-prod my-app:${{ github.sha }}
          "

# .github/workflows/deploy-prod.yml
name: 🚀 Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    runs-on: [self-hosted, Linux, ARM64]  # Your Oracle VM runner
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      # ✅ YOUR DEPLOY STEP GOES HERE:
      - name: 🚀 Deploy to Oracle VM
        run: |
          APP_DIR="/home/deploy/docker-work/my-app"
          mkdir -p "$APP_DIR"
          rsync -av --delete --exclude=".git" "$GITHUB_WORKSPACE/" "$APP_DIR/" 2>/dev/null || cp -r "$GITHUB_WORKSPACE"/* "$APP_DIR/"
          cd "$APP_DIR"
          
          # Ensure Dockerfile exists
          if [ ! -f Dockerfile ]; then
            echo "FROM nginx:alpine" > Dockerfile
            echo "COPY index.html /usr/share/nginx/html/" >> Dockerfile
            echo "EXPOSE 80" >> Dockerfile
            echo 'CMD ["nginx", "-g", "daemon off;"]' >> Dockerfile
          fi
          
          # Build image
          echo "🔨 Building Docker image..."
          docker build -t my-app:latest .
          
          # ✅ ROBUST CLEANUP: Stop AND force-remove old container
          echo "🔄 Cleaning up old container..."
          docker stop my-app 2>/dev/null || true
          docker rm -f my-app 2>/dev/null || true
          
          # Start new container
          echo "🚀 Starting new container..."
          docker run -d -p 80:80 --name my-app --restart unless-stopped my-app:latest
          
          # Wait and verify
          sleep 5
          echo "✅ Verifying deployment..."
          curl -s http://localhost:80 | head -3 || echo "⚠️ App not responding yet"

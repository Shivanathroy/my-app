name: 🚀 Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to oracle-host
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3

    - name: 📋 Show deployment info
      run: |
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "🔖 Commit : ${{ github.sha }}"
        echo "💬 Message: ${{ github.event.head_commit.message }}"
        echo "👤 Author : ${{ github.actor }}"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    - name: 🚀 SSH into oracle-host and deploy
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📥 Step 1: Pull latest code..."
          cd ~/docker-work/my-app
          git pull origin main

          echo "🔨 Step 2: Build image HERE on oracle-host..."
          docker build -t my-app:latest .

          echo "🔄 Step 3: Stop old container..."
          docker stop my-app || true
          docker rm my-app || true

          echo "🚀 Step 4: Start new container..."
          docker run -d \
            -p 80:80 \
            --name my-app \
            --restart unless-stopped \
            my-app:latest

          echo "⏳ Step 5: Wait for app..."
          sleep 5

          echo "✅ Step 6: Check status..."
          docker ps | grep my-app

          echo "🧹 Step 7: Clean old images..."
          docker image prune -f

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎉 Deployment Complete!"
          echo "🌐 App live on port 80!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

name: Deploy to Oracle VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Setup SSH agent with private key
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.ORACLE_SSH_KEY }}

      # Step 3: Test SSH connection (optional)
      - name: Test SSH Connection
        run: ssh -o StrictHostKeyChecking=no deploy@172.16.175.149 "echo 'SSH OK'"

      # Step 4: Run remote commands on Oracle VM
      - name: Deploy App on Oracle VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 172.16.175.149
          username: deploy
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: 22
          script: |
            cd ~/my-app
            git pull origin main
            docker compose down
            docker compose up -d --build
            docker ps -a

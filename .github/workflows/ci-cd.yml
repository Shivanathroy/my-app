name: My App CI/CD

on:
  push:
    branches:
      - main
      - develop

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/my-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Push Docker image
        run: docker push $IMAGE_NAME:${{ github.sha }}

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Oracle host to known_hosts
        run: ssh-keyscan -H ${{ secrets.ORACLE_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Dev
        run: |
          ssh ${{ secrets.ORACLE_USER }}@${{ secrets.ORACLE_HOST }} "
          docker pull $IMAGE_NAME:${{ github.sha }}
          docker stop my-app-dev || true
          docker rm my-app-dev || true
          docker run -d -p 8080:80 --name my-app-dev $IMAGE_NAME:${{ github.sha }}
          "

  deploy-qa:
    runs-on: ubuntu-latest
    needs: deploy-dev
    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Oracle host to known_hosts
        run: ssh-keyscan -H ${{ secrets.ORACLE_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to QA
        run: |
          ssh ${{ secrets.ORACLE_USER }}@${{ secrets.ORACLE_HOST }} "
          docker stop my-app-qa || true
          docker rm my-app-qa || true
          docker run -d -p 8081:80 --name my-app-qa $IMAGE_NAME:${{ github.sha }}
          "

  deploy-staging:
    runs-on: ubuntu-latest
    needs: deploy-qa
    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Oracle host to known_hosts
        run: ssh-keyscan -H ${{ secrets.ORACLE_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Staging
        run: |
          ssh ${{ secrets.ORACLE_USER }}@${{ secrets.ORACLE_HOST }} "
          docker stop my-app-staging || true
          docker rm my-app-staging || true
          docker run -d -p 8082:80 --name my-app-staging $IMAGE_NAME:${{ github.sha }}
          "

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Oracle host to known_hosts
        run: ssh-keyscan -H ${{ secrets.ORACLE_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Production
        run: |
          ssh ${{ secrets.ORACLE_USER }}@${{ secrets.ORACLE_HOST }} "
          docker stop my-app-prod || true
          docker rm my-app-prod || true
          docker run -d -p 80:80 --name my-app-prod $IMAGE_NAME:${{ github.sha }}
          "

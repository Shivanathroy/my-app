name: Build & Deploy Docker to Oracle VM

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    # DEBUG: Check if secrets exist
    - name: Debug - Check Secrets
      run: |
        echo "Checking secrets..."
        echo "ORACLE_VM_IP: ${{ secrets.ORACLE_VM_IP }}"
        echo "ORACLE_VM_USER: ${{ secrets.ORACLE_VM_USER }}"
        if [ -z "${{ secrets.ORACLE_VM_IP }}" ]; then
          echo "ERROR: ORACLE_VM_IP is empty!"
          exit 1
        fi
        echo "All secrets found! ✅"
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/my-app:latest
    
    # DEPLOY: Send to Oracle VM
    - name: Deploy to Oracle VM
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.ORACLE_VM_IP }}
        username: ${{ secrets.ORACLE_VM_USER }}
        key: ${{ secrets.ORACLE_VM_SSH_KEY }}
        port: 22
        script: |
          echo "✅ Connected to Oracle VM!"
          whoami
          docker --version
          docker pull ${{ secrets.DOCKER_USERNAME }}/my-app:latest || echo "Image pull failed"
          echo "✅ Deployment complete!"

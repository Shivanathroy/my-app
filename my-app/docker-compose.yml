version: "3.8"

services:
  app:
    build: .
    container_name: my-app
    restart: always
    ports:
      - "5000:5000"
    command: python app.py

  nginx:
    image: nginx:latest
    container_name: my-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app

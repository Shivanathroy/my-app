name: ✅ Final CI/CD Test

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    # ✅ Use ONLY GitHub's default labels (exact capitalization!)
    runs-on: [self-hosted, Linux, ARM64]
    
    # ✅ NO concurrency block = no locks possible!

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Oracle VM
        run: |
          APP_DIR="/home/deploy/docker-work/my-app"
          mkdir -p "$APP_DIR"
          
          # Copy code to deploy directory
          rsync -av --delete --exclude='.git' "$GITHUB_WORKSPACE/" "$APP_DIR/" 2>/dev/null || cp -r "$GITHUB_WORKSPACE"/* "$APP_DIR/"
          cd "$APP_DIR"
          
          # Ensure we have a valid Dockerfile
          if [ ! -f Dockerfile ]; then
            echo "FROM nginx:alpine" > Dockerfile
            echo "COPY index.html /usr/share/nginx/html/" >> Dockerfile
            echo "EXPOSE 80" >> Dockerfile
            echo 'CMD ["nginx", "-g", "daemon off;"]' >> Dockerfile
          fi
          
          # Build and deploy
          echo "🔨 Building..."
          docker build -t my-app:latest .
          
          echo "🔄 Restarting container..."
          docker stop my-app 2>/dev/null; docker rm my-app 2>/dev/null
          docker run -d -p 80:80 --name my-app --restart unless-stopped my-app:latest
          
          sleep 5
          echo "✅ Live: $(curl -s http://localhost:80 | grep -o '<title>.*</title>')"

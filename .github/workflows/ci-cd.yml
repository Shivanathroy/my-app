name: My App CI/CD

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t my-app:${{ github.sha }} .

      - name: Push Docker image
        run: docker tag my-app:${{ github.sha }} yourdockerhubusername/my-app:${{ github.sha }} && \
             docker push yourdockerhubusername/my-app:${{ github.sha }}

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to Dev
        run: ssh deploy@172.16.175.149 "
             docker pull yourdockerhubusername/my-app:${{ github.sha }} && \
             docker stop my-app-dev || true && \
             docker rm my-app-dev || true && \
             docker run -d -p 8080:80 --name my-app-dev yourdockerhubusername/my-app:${{ github.sha }}"

  deploy-qa:
    runs-on: ubuntu-latest
    needs: deploy-dev
    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to QA
        run: ssh deploy@172.16.175.149 "
             docker pull yourdockerhubusername/my-app:${{ github.sha }} && \
             docker stop my-app-qa || true && \
             docker rm my-app-qa || true && \
             docker run -d -p 8081:80 --name my-app-qa yourdockerhubusername/my-app:${{ github.sha }}"

  deploy-staging:
    runs-on: ubuntu-latest
    needs: deploy-qa
    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to Staging
        run: ssh deploy@172.16.175.149 "
             docker pull yourdockerhubusername/my-app:${{ github.sha }} && \
             docker stop my-app-staging || true && \
             docker rm my-app-staging || true && \
             docker run -d -p 8082:80 --name my-app-staging yourdockerhubusername/my-app:${{ github.sha }}"

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to Production
        run: ssh deploy@172.16.175.149 "
             docker pull yourdockerhubusername/my-app:${{ github.sha }} && \
             docker stop my-app-prod || true && \
             docker rm my-app-prod || true && \
             docker run -d -p 80:80 --name my-app-prod yourdockerhubusername/my-app:${{ github.sha }}"

name: Full CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set APP_DIR
        run: echo "APP_DIR=$PWD" >> $GITHUB_ENV

      - name: Deploy with Docker Compose
        run: |
          cd $APP_DIR
          docker-compose down --remove-orphans
          docker-compose up -d --build
          
      - name: Wait for App
        run: sleep 5

      - name: Test Flask App
        run: curl -f http://localhost:5000

      - name: Test NGINX
        run: curl -f http://localhost

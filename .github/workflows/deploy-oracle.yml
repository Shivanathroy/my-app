name: Deploy to Oracle VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted   # this will use Oracle VM runner
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.ORACLE_SSH_KEY }}

      - name: Test SSH Connection
        run: ssh -o StrictHostKeyChecking=no deploy@localhost "echo 'SSH OK'"

      - name: Deploy App
        run: |
          cd ~/my-app
          git pull origin main
          docker compose down
          docker compose up -d --build
          docker ps -a

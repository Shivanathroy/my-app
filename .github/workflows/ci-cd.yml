name: My App CI/CD

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t my-app:${{ github.sha }} .

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to Dev
        run: |
          docker run --rm -d -p 8080:80 --name my-app-dev my-app:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8080

  deploy-qa:
    runs-on: ubuntu-latest
    needs: deploy-dev
    steps:
      - name: Deploy to QA
        run: |
          docker run --rm -d -p 8081:80 --name my-app-qa my-app:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8081

  deploy-staging:
    runs-on: ubuntu-latest
    needs: deploy-qa
    steps:
      - name: Deploy to Staging
        run: |
          docker run --rm -d -p 8082:80 --name my-app-staging my-app:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8082

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Deploy to Production
        run: |
          docker run --rm -d -p 80:80 --name my-app-prod my-app:${{ github.sha }}

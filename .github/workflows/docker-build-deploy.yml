name: Build & Deploy Docker to Oracle VM

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # ← Updated from v3
    
    # DEBUG: Verify secrets are loaded
    - name: Debug - Check Secrets
      run: |
        echo "Checking all required values..."
        
        # Check VARIABLES (using vars.)
        if [ -z "${{ vars.ORACLE_VM_IP }}" ]; then
          echo "❌ ERROR: ORACLE_VM_IP variable is empty!"
          exit 1
        fi
        echo "✅ ORACLE_VM_IP: ${{ vars.ORACLE_VM_IP }}"
        
        if [ -z "${{ vars.ORACLE_VM_USER }}" ]; then
          echo "❌ ERROR: ORACLE_VM_USER variable is empty!"
          exit 1
        fi
        echo "✅ ORACLE_VM_USER: ${{ vars.ORACLE_VM_USER }}"
        
        # Check SECRETS (using secrets.)
        if [ -z "${{ secrets.ORACLE_VM_SSH_KEY }}" ]; then
          echo "❌ ERROR: ORACLE_VM_SSH_KEY secret is empty!"
          exit 1
        fi
        echo "✅ ORACLE_VM_SSH_KEY: Found (hidden)"
        
        if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
          echo "❌ ERROR: DOCKER_USERNAME secret is empty!"
          exit 1
        fi
        echo "✅ DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}"
        
        echo ""
        echo "✅ All values found! Ready to deploy!"
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/my-app:latest
    
    # DEPLOY: SSH to Oracle VM
    - name: Deploy to Oracle VM
      uses: appleboy/ssh-action@master
      with:
        host: ${{ vars.ORACLE_VM_IP }}          # ← Use VARIABLE (vars.)
        username: ${{ vars.ORACLE_VM_USER }}    # ← Use VARIABLE (vars.)
        key: ${{ secrets.ORACLE_VM_SSH_KEY }}   # ← Use SECRET (secrets.)
        port: 22
        script: |
          echo "================================"
          echo "✅ Connected to Oracle VM!"
          echo "================================"
          whoami
          hostname -I
          docker --version
          
          echo ""
          echo "Pulling latest Docker image..."
          docker pull ${{ secrets.DOCKER_USERNAME }}/my-app:latest
          
          echo "Stopping old container..."
          docker stop my-app || true
          docker rm my-app || true
          
          echo "Starting new container..."
          docker run -d --name my-app ${{ secrets.DOCKER_USERNAME }}/my-app:latest
          
          echo ""
          echo "Container logs:"
          docker logs my-app
          
          echo ""
          echo "✅ Deployment complete!"

name: Deploy to Oracle VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your repo
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ Setup SSH agent with private key secret
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # 3️⃣ Add Oracle VM host to known_hosts
      - name: Add Oracle VM to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts

      # 4️⃣ Test SSH connection
      - name: Test SSH Connection
        run: ssh -v ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "echo 'SSH Connection Successful'"

      # 5️⃣ Deploy application on Oracle VM
      - name: Deploy App
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            echo "Deploying my-app on Oracle VM..."
            cd ~/my-app
            git pull origin main
            docker compose down || true
            docker compose up -d --build
            docker ps -a
          EOF
